<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workspace Sync</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f8;
      --panel: #ffffff;
      --text: #171717;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #0f766e;
      --accent-2: #115e59;
      --danger: #b91c1c;
      --danger-2: #991b1b;
      --warn-bg: #fef3c7;
      --warn-text: #92400e;
      --same-bg: #eef2f7;
      --same-text: #475569;
      --add-bg: #dcfce7;
      --add-text: #166534;
      --remove-bg: #fee2e2;
      --remove-text: #991b1b;
      --option-bg: #ffffff;
      --option-text: #171717;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --panel: #1f2937;
        --text: #f3f4f6;
        --muted: #9ca3af;
        --border: #374151;
        --accent: #14b8a6;
        --accent-2: #0f766e;
        --danger: #f87171;
        --danger-2: #dc2626;
        --warn-bg: #3f2d12;
        --warn-text: #fbbf24;
        --same-bg: #243041;
        --same-text: #cbd5e1;
        --add-bg: #163726;
        --add-text: #86efac;
        --remove-bg: #3b1d1d;
        --remove-text: #fca5a5;
        --option-bg: #1f2937;
        --option-text: #f3f4f6;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 450px;
      font: 14px/1.45 system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap { padding: 14px; }
    h1 { margin: 0 0 8px; font-size: 16px; }
    .note { margin: 0 0 12px; font-size: 12px; color: var(--muted); }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    select,
    input[type="text"] {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
    }

    select {
      appearance: auto;
      -webkit-appearance: menulist;
    }

    option,
    optgroup {
      background: var(--option-bg);
      color: var(--option-text);
      -webkit-appearance: none;
    }

    .source-group {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .choice {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .choice input { margin-top: 2px; }
    .choice-title { font-weight: 600; margin-bottom: 2px; }
    .choice-sub { font-size: 12px; color: var(--muted); }

    .summary-strip {
      margin: 8px 0 12px;
      padding: 10px;
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border));
      font-weight: 600;
    }

    .path-preview {
      margin: -4px 0 10px;
      font-size: 12px;
      color: var(--muted);
      word-break: break-word;
    }

    .diff-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .diff-card {
      border-radius: 8px;
      padding: 10px;
      border: 1px solid var(--border);
    }

    .diff-card.same { background: var(--same-bg); color: var(--same-text); }
    .diff-card.add { background: var(--add-bg); color: var(--add-text); }
    .diff-card.remove { background: var(--remove-bg); color: var(--remove-text); }

    .diff-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0.9;
      margin-bottom: 4px;
    }

    .diff-value {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .details-box {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
    }

    .details-box summary {
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .details-section {
      margin-top: 10px;
    }

    .details-section-title {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .details-list {
      margin: 0;
      padding-left: 18px;
      font-size: 12px;
      color: var(--muted);
      max-height: 120px;
      overflow: auto;
    }

    .warning-box {
      margin: 6px 0 10px;
      padding: 10px;
      border-radius: 8px;
      background: var(--warn-bg);
      color: var(--warn-text);
      font-size: 12px;
      border: 1px solid color-mix(in srgb, var(--warn-text) 25%, var(--border));
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      width: 100%;
      padding: 10px 12px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--accent-2); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .danger-btn { background: var(--danger); }
    .danger-btn:hover { background: var(--danger-2); }

    #status {
      margin-top: 10px;
      min-height: 18px;
      font-size: 12px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    #status.danger { color: var(--danger); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Workspace Sync</h1>
    <p class="note">Compare a live workspace with a bookmark folder, then merge or sync the folder to match it.</p>

    <div class="panel">
      <div class="section-title">Source</div>
      <div class="source-group">
        <label class="choice">
          <input type="radio" name="sourceMode" value="window" checked>
          <span>
            <div class="choice-title">Current window tabs</div>
            <div class="choice-sub">Use all bookmarkable tabs in the current Brave window.</div>
          </span>
        </label>

        <label class="choice">
          <input type="radio" name="sourceMode" value="highlighted">
          <span>
            <div class="choice-title">Highlighted tabs only</div>
            <div class="choice-sub">Use only selected tabs in the current window.</div>
          </span>
        </label>
      </div>

      <div id="sourceSummary" class="summary-strip">Source contains 0 tab(s).</div>

      <label for="folderSelect">Target folder</label>
      <select id="folderSelect"></select>
      <div id="folderPathPreview" class="path-preview"></div>

      <div class="section-title">Diff</div>
      <div class="diff-grid">
        <div class="diff-card same">
          <div class="diff-label">Unchanged</div>
          <div id="sameCount" class="diff-value">0</div>
        </div>
        <div class="diff-card add">
          <div class="diff-label">New in source</div>
          <div id="addCount" class="diff-value">0</div>
        </div>
        <div class="diff-card remove">
          <div class="diff-label">Only in folder</div>
          <div id="removeCount" class="diff-value">0</div>
        </div>
      </div>

      <details class="details-box">
        <summary>Show diff details</summary>

        <div class="details-section">
          <div class="details-section-title">New in source</div>
          <ul id="addList" class="details-list"></ul>
        </div>

        <div class="details-section">
          <div class="details-section-title">Only in folder</div>
          <ul id="removeList" class="details-list"></ul>
        </div>

        <div class="details-section">
          <div class="details-section-title">Unchanged</div>
          <ul id="sameList" class="details-list"></ul>
        </div>
      </details>

      <div id="warningBox" class="warning-box"></div>

      <div class="actions">
        <button id="mergeBtn">Merge into folder</button>
        <button id="syncBtn" class="danger-btn">Sync folder to source</button>
      </div>

      <div id="status"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
