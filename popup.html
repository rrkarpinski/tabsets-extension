<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Selected Tabs Bookmark Manager</title>
  <style>
    :root { color-scheme: light dark; --bg:#f7f7f8; --panel:#fff; --text:#171717; --muted:#6b7280; --border:#d1d5db; --accent:#0f766e; --danger:#b91c1c; }
    @media (prefers-color-scheme: dark) { :root { --bg:#111827; --panel:#1f2937; --text:#f3f4f6; --muted:#9ca3af; --border:#374151; --accent:#14b8a6; --danger:#f87171; } }
    * { box-sizing: border-box; }
    body { margin:0; font:14px/1.4 system-ui,sans-serif; background:var(--bg); color:var(--text); width:380px; }
    .wrap { padding:14px; }
    h1 { font-size:16px; margin:0 0 10px; }
    p.note { margin:0 0 12px; color:var(--muted); font-size:12px; }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:12px; }
    label { display:block; font-weight:600; margin-bottom:6px; }
    select, input[type="text"] { width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--border); background:transparent; color:inherit; margin-bottom:10px; }
    .check { display:flex; align-items:start; gap:8px; margin:8px 0; font-weight:400; }
    .check input { margin-top:2px; }
    button { width:100%; padding:10px 12px; border:0; border-radius:8px; background:var(--accent); color:white; font-weight:700; cursor:pointer; }
    #status { margin-top:10px; min-height:18px; font-size:12px; color:var(--muted); white-space:pre-wrap; }
    .danger { color:var(--danger); }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Bookmark selected tabs</h1>
    <p class="note">Save highlighted tabs, the active tab, or all tabs into a new or existing folder.</p>
    <div class="panel">
      <label for="tabMode">Tabs to save</label>
      <select id="tabMode">
        <option value="highlighted">Highlighted tabs</option>
        <option value="active">Active tab</option>
        <option value="all">All tabs in current window</option>
      </select>
      <label for="destMode">Destination</label>
      <select id="destMode">
        <option value="existing">Existing folder</option>
        <option value="new">New folder</option>
      </select>
      <div id="existingFolderWrap">
        <label for="folderSelect">Existing folder</label>
        <select id="folderSelect"></select>
      </div>
      <div id="newFolderWrap" class="hidden">
        <label for="folderName">New folder name</label>
        <input id="folderName" type="text" placeholder="e.g. Research tabs April 2026">
      </div>
      <label class="check"><input id="overwrite" type="checkbox"><span>Overwrite selected existing folder before saving</span></label>
      <label class="check"><input id="recursive" type="checkbox"><span>When overwriting, also delete subfolders recursively</span></label>
      <button id="saveBtn">Save bookmarks</button>
      <div id="status"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
